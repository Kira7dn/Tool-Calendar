<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Hệ Thống Điều Phối Công Văn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.login-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1a3a6e 0%, #0f2654 60%, #922b21 100%);
            overflow: hidden;
        }

        body.login-page::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(to right, #c0392b 33%, #f1c40f 33%, #f1c40f 66%, #c0392b 66%);
            z-index: 10;
        }

        .login-card {
            width: 420px;
            padding: 44px 40px 36px;
            background: #ffffff;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            border-top: 5px solid #c0392b;
        }

        .login-logo {
            width: 72px;
            height: 72px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 3px solid #1a3a6e;
        }

        .login-card h2 {
            font-size: 1.45rem;
            font-weight: 800;
            margin-bottom: 4px;
            color: #1a3a6e;
        }

        .login-card > p {
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: #374151;
            margin-bottom: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #f8faff;
            border: 1.5px solid #c9d4e8;
            border-radius: 8px;
            color: #1a1a2e;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: #1a3a6e;
            box-shadow: 0 0 0 3px rgba(26,58,110,0.1);
            background: #fff;
        }

        .login-btn {
            width: 100%;
            margin-top: 8px;
            justify-content: center;
            padding: 13px;
            font-size: 1rem;
            background: #c0392b;
            border-radius: 8px;
            color: white;
        }

        .login-btn:hover { background: #a93226; }

        .error-msg {
            color: #c0392b;
            font-size: 0.85rem;
            margin-top: 14px;
            display: none;
            background: #fdf2f2;
            border: 1px solid #f5c6cb;
            padding: 10px 14px;
            border-radius: 7px;
            text-align: left;
        }
    </style>
</head>

<body class="login-page">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <img src="assets/LINK STRATEGY.png" alt="Logo" class="login-logo"
            onerror="this.src='https://via.placeholder.com/64'">
        <h2>Chào mừng trở lại</h2>
        <p>Vui lòng đăng nhập để quản lý công văn</p>

        <!-- Thông báo bị đăng xuất từ thiết bị khác -->
        <div id="kicked-banner" style="
            display: none;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            text-align: left;
        ">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.2rem;">⚠️</span>
                <div>
                    <div style="color: #ef4444; font-weight: 600; font-size: 0.9rem;">Phiên đăng nhập đã bị chấm dứt
                    </div>
                    <div style="color: #94a3b8; font-size: 0.8rem; margin-top: 2px;">Tài khoản của bạn đã đăng nhập từ
                        một thiết bị khác.</div>
                </div>
            </div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="admin" required autofocus>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="••••••••" required style="padding-right: 40px;">
                    <span id="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b; font-size: 1.1rem; user-select: none;" title="Hiện mật khẩu">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary login-btn" id="submit-btn">
                <span>Đăng nhập ngay</span>
            </button>
            <div id="error-alert" class="error-msg"></div>
        </form>
    </div>

    <script>
        document.getElementById('toggle-password').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
            pwd.setAttribute('type', type);
            this.innerText = type === 'password' ? '👁️' : '🙈';
            this.title = type === 'password' ? 'Hiện mật khẩu' : 'Ẩn mật khẩu';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');
            const submitBtn = document.getElementById('submit-btn');

            errorAlert.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Đang xác thực...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_name', data.username);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_id', data.userId);
                    window.location.href = 'index.html';
                } else {
                    const err = await res.json();
                    errorAlert.innerText = err.message || 'Đăng nhập thất bại.';
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.innerText = 'Lỗi kết nối máy chủ.';
                errorAlert.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Đăng nhập ngay';
            }
        });

        // Hiển thị banner nếu bị đăng xuất từ thiết bị khác
        if (sessionStorage.getItem('kicked_out') === '1') {
            document.getElementById('kicked-banner').style.display = 'block';
            sessionStorage.removeItem('kicked_out');
        }

        // Kiểm tra nếu đã login thì chuyển thẳng vào dashboard
        if (localStorage.getItem('auth_token')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
