<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Điều Phối Công Văn | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260421-v2">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" data-action="close-sidebar"></div>

    <div class="app-container">
        <aside class="sidebar" id="main-sidebar">
            <button class="sidebar-toggle-btn" id="sidebar-toggle" data-action="toggle-sidebar"
                title="Thu gọn / Mở rộng menu">
                ☰
            </button>

            <div class="logo">
                <img id="app-logo" src="/assets/logo.png" alt="Logo">
                <h2 class="logo-text">UBND phường Cẩm Phả</h2>
            </div>

            <ul class="nav-menu">
                <li class="nav-item active" data-tab="dashboard">
                    <span class="nav-icon">&#128202;</span>
                    <span class="nav-label">Dashboard</span>
                </li>
                <li class="nav-item" data-tab="documents">
                    <span class="nav-icon">&#128196;</span>
                    <span class="nav-label">Văn bản</span>
                </li>
                <li class="nav-item" data-tab="upload">
                    <span class="nav-icon">&#128228;</span>
                    <span class="nav-label">Tải hồ sơ mới</span>
                </li>
                <li class="nav-item" data-tab="users" id="nav-users" style="display: none;">
                    <span class="nav-icon">&#128101;</span>
                    <span class="nav-label">Nhân sự</span>
                </li>
                <li class="nav-item" data-tab="my-tasks" id="nav-my-tasks" style="display: none;">
                    <span class="nav-icon">&#128203;</span>
                    <span class="nav-label">Công việc của tôi</span>
                </li>
                <li class="nav-item" data-tab="settings">
                    <span class="nav-icon">&#9881;&#65039;</span>
                    <span class="nav-label">Cấu hình</span>
                </li>
                <li class="nav-item nav-item-logout" data-action="logout">
                    <span class="nav-icon">&#128682;</span>
                    <span class="nav-label">Đăng xuất</span>
                </li>
            </ul>

            <div class="user-pill" id="user-pill">
                <p class="user-pill-label">Đang truy cập:</p>
                <p class="user-pill-name" style="font-weight: 700;">Admin User</p>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <button class="mobile-menu-btn" id="mobile-menu-btn" data-action="open-sidebar" aria-label="Mở menu">☰</button>
                <div class="header-title">
                    <h1 id="page-title">Hệ Thống Điều Phối Công Văn</h1>
                    <p id="page-subtitle">Giám sát và đôn đốc thực thi công việc thời gian thực</p>
                </div>
                <div class="header-actions">
                    <div id="notif-banner" class="notif-banner" data-action="request-notification-permission">
                        &#128276; Bật thông báo đẩy
                    </div>
                    <button class="btn btn-primary" data-tab="upload">
                        <span>&#10133; Thêm văn bản</span>
                    </button>
                </div>
            </header>

            <div id="tab-host" class="tab-host"></div>
        </main>
    </div>

    <div id="modal-host"></div>

    <script type="module">
        window.__APP_VERSION__ = '20260421-preview-modal-fix';
        import '/js/main.js?v=20260421-v2';
    </script>
</body>

</html>
