<section id="tab-upload" class="tab-content">
    <div class="data-section upload-scene" style="padding: 40px; text-align: center; overflow-y: auto;">
        <div style="border: 2px dashed var(--border-color); padding: 30px 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 16px; background: rgba(255,255,255,0.02);"
            id="drop-zone">
            <h2 style="margin-bottom: 8px;">&#128194; K&eacute;o th&#7843; file PDF v&agrave;o &#273;&acirc;y</h2>
            <p style="color: var(--text-secondary); margin-bottom: 16px;">H&#7879; th&#7889;ng s&#7869; t&#7921; &#273;&#7897;ng b&oacute;c t&aacute;ch (OCR) th&ocirc;ng tin v&#259;n b&#7843;n</p>
            <input type="file" id="file-input" multiple style="display: none;" accept=".pdf,.doc,.docx">
            <input type="file" id="folder-input" webkitdirectory directory multiple style="display: none;">
            <div id="upload-actions" style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-primary" data-action="open-file-input">
                    Ch&#7885;n file t&#7915; m&aacute;y t&iacute;nh
                </button>
                <button class="btn" style="background: #e2e8f0; color: #1e293b;" data-action="open-folder-input">
                    &#128193; Ch&#7885;n th&#432; m&#7909;c
                </button>
            </div>
        </div>

        <div id="upload-processing" class="processing-pulse"
            style="display: none; margin-top: 20px; padding: 15px; background: rgba(55, 114, 255, 0.05); min-height: 200px; flex-direction: column; justify-content: center; align-items: center; border-radius: 12px;">
            <div class="loader-ring"></div>
            <h4 style="margin-top: 10px; color: var(--primary);">&#272;ang b&oacute;c t&aacute;ch d&#7919; li&#7879;u</h4>
            <p id="processing-file-count" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px;">-</p>

            <div
                style="width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 20px; overflow: hidden;">
                <div id="upload-progress-bar"
                    style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease;">
                </div>
            </div>
            <p id="processing-filename"
                style="margin-top: 10px; font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                Chu&#7849;n b&#7883; x&#7917; l&yacute;...
            </p>
        </div>

        <div id="batch-upload-result" class="batch-workspace"
            style="display: none; margin-top: 40px; text-align: left; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 16px;">
            <div class="batch-toolbar">
                <div>
                    <h3>H&agrave;ng ch&#7901; OCR &amp; &#273;i&#7873;u ph&#7889;i</h3>
                </div>
                <div class="batch-toolbar-actions">
                    <button class="btn batch-toolbar-btn batch-toolbar-btn-review" data-action="enter-review-scene">
                        <span class="batch-btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M3 12s3.5 -6 9 -6s9 6 9 6s-3.5 6 -9 6s-9 -6 -9 -6"></path><path d="M12 9a3 3 0 1 0 0 6a3 3 0 0 0 0 -6"></path></svg>
                        </span>
                        <span>R&agrave; so&aacute;t</span>
                    </button>
                    <button class="btn batch-toolbar-btn batch-toolbar-btn-saveall" data-action="confirm-all-batch">
                        <span class="batch-btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M8 5h9l3 3v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"></path><path d="M8 8H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10"></path><path d="m10 13 2 2 4-4"></path></svg>
                        </span>
                        <span>L&#432;u to&agrave;n b&#7897;</span>
                    </button>
                    <button class="btn batch-toolbar-btn batch-toolbar-btn-clear" data-action="clear-batch">
                        <span class="batch-btn-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"></path><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"></path></svg>
                        </span>
                        <span>X&oacute;a danh s&aacute;ch</span>
                    </button>
                </div>
            </div>
            <div class="table-scroll batch-table-scroll">
                <table id="batch-table" class="batch-table-rich">
                    <thead>
                        <tr>
                            <th>T&#7879;p</th>
                            <th>S&#7889; hi&#7879;u</th>
                            <th>H&#7841;n x&#7917; l&yacute;</th>
                            <th>Ph&ograve;ng ban</th>
                            <th>C&aacute;n b&#7897;</th>
                            <th>Thao t&aacute;c</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="pagination">
                <button class="btn" data-action="prev-batch-page" id="btn-prev-batch"
                    style="background: #e2e8f0; color: #1e293b;">Tr&#432;&#7899;c</button>
                <span id="batch-page-info" style="color: var(--text-secondary);">Trang 1 / 1</span>
                <button class="btn" data-action="next-batch-page" id="btn-next-batch"
                    style="background: #e2e8f0; color: #1e293b;">Sau</button>
            </div>
        </div>
    </div>
</section>
