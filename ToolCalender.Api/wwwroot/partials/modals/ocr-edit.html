<div id="edit-ocr-modal" class="modal"
    style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
    <div class="data-section modal-body" style="width: 560px; padding: 30px; position: relative;">
        <button style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem; line-height: 1; cursor: pointer; color: var(--text-secondary); transition: color 0.2s;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--text-secondary)'" data-action="close-edit-modal" title="Đóng">&times;</button>
        <h3 style="margin-bottom: 20px;">Kiểm tra kết quả bóc tách</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
                <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">Số hiệu</label>
                <input type="text" id="ocr-so"
                    style="width: 100%; padding: 8px 10px; background: #ffffff; border: 1px solid #cbd5e1; color: #1e293b; border-radius: 6px; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">Hạn xử lý</label>
                <input type="text" id="ocr-han" placeholder="dd/MM/yyyy" inputmode="numeric"
                    style="width: 100%; padding: 8px 10px; background: #ffffff; border: 1px solid #cbd5e1; color: #1e293b; border-radius: 6px; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">Phòng ban</label>
                <div id="modal-dept-container"></div>
            </div>
            <div>
                <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">Cán bộ</label>
                <div id="modal-user-container"></div>
            </div>
            <div style="grid-column: span 2;">
                <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">Cơ quan chủ quản/Tham mưu</label>
                <input type="text" id="ocr-coquan"
                    style="width: 100%; padding: 8px 10px; background: #ffffff; border: 1px solid #cbd5e1; color: #1e293b; border-radius: 6px; box-sizing: border-box;">
            </div>
            <div style="grid-column: span 2;">
                <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px;">Trích yếu</label>
                <textarea id="ocr-trichyeu"
                    style="width: 100%; height: 90px; padding: 8px 10px; background: #ffffff; border: 1px solid #cbd5e1; color: #1e293b; border-radius: 6px; resize: vertical; box-sizing: border-box;"></textarea>
            </div>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
            <button class="btn" style="background: #e2e8f0; color: #1e293b;" data-action="close-edit-modal">Hủy bỏ</button>
            <button class="btn btn-primary" data-action="save-edit">Cập nhật</button>
        </div>
    </div>
</div>
