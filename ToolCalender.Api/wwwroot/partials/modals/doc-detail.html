<div id="doc-detail-modal"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1500; align-items:center; justify-content:center; padding:16px;">
    <div
        style="background:#111827; border-radius:20px; width:100%; max-width:760px; max-height:90vh; display:flex; flex-direction:column; box-shadow:0 25px 80px rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.08);">
        <div style="padding:24px 28px 0; display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
            <div>
                <h3 id="doc-modal-title" style="margin:0; font-size:1.2rem;">Chi tiết văn bản</h3>
                <p id="doc-modal-subtitle" style="margin:4px 0 0; font-size:0.8rem; color:var(--text-secondary);"></p>
            </div>
            <button data-action="close-doc-detail-modal" class="modal-close-btn"
                style="background:#f1f5f9; border:1px solid #cbd5e1; color:#1e293b; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; transition:background 0.2s;">✕</button>
        </div>

        <div style="display:flex; gap:0; padding:16px 28px 0; border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0;">
            <button id="doc-tab-view" class="doc-modal-tab doc-modal-tab-active" data-action="switch-doc-tab" data-doc-tab="view">📋 Chi tiết</button>
            <button id="doc-tab-edit" class="doc-modal-tab" data-action="switch-doc-tab" data-doc-tab="edit" style="display:none;">✏️ Chỉnh sửa</button>
            <button id="doc-tab-comments" class="doc-modal-tab" data-action="switch-doc-tab" data-doc-tab="comments">💬 Bình luận
                <span id="comment-count-badge"
                    style="background:var(--primary); border-radius:99px; padding:1px 7px; font-size:0.7rem; margin-left:4px;">0</span></button>
        </div>

        <div style="flex:1; overflow-y:auto; padding:24px 28px;">
            <div id="doc-panel-view">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div class="doc-field">
                        <label>Số văn bản</label>
                        <p id="dv-so"></p>
                    </div>
                    <div class="doc-field">
                        <label>Ngày ban hành</label>
                        <p id="dv-ngaybanhanh"></p>
                    </div>
                    <div class="doc-field" style="grid-column:span 2;">
                        <label>Trích yếu</label>
                        <p id="dv-trichyeu" style="line-height:1.6;"></p>
                    </div>
                    <div class="doc-field">
                        <label>Cơ quan ban hành</label>
                        <p id="dv-coquanbanhanh"></p>
                    </div>
                    <div class="doc-field">
                        <label>Cơ quan tham mưu</label>
                        <p id="dv-coquanchuquan"></p>
                    </div>
                    <div class="doc-field">
                        <label>Thời hạn xử lý</label>
                        <p id="dv-thoihan"></p>
                    </div>
                    <div class="doc-field">
                        <label>Trạng thái</label>
                        <p id="dv-status"></p>
                    </div>
                    <div class="doc-field">
                        <label>Độ khẩn</label>
                        <p id="dv-priority"></p>
                    </div>
                    <div class="doc-field">
                        <label>Ngày thêm</label>
                        <p id="dv-ngaythem"></p>
                    </div>
                    <div class="doc-field" style="grid-column:span 2;">
                        <label>Tệp tin gốc</label>
                        <div id="dv-view-pdf"></div>
                    </div>
                    <div class="doc-field" style="grid-column:span 2;">
                        <div id="dv-evidence"></div>
                    </div>
                </div>
            </div>

            <div id="doc-panel-edit" style="display:none;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Số hiệu văn bản</label>
                        <input type="text" id="de-so" class="modal-input">
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Ngày ban hành</label>
                        <input type="date" id="de-ngaybanhanh" class="modal-input">
                    </div>
                    <div style="grid-column:span 2;">
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Trích yếu</label>
                        <textarea id="de-trichyeu" class="modal-input" rows="4" style="resize:vertical;"></textarea>
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Cơ quan ban hành</label>
                        <input type="text" id="de-coquanbanhanh" class="modal-input">
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Cơ quan tham mưu</label>
                        <input type="text" id="de-coquanchuquan" class="modal-input">
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Thời hạn xử lý</label>
                        <input type="date" id="de-thoihan" class="modal-input">
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Trạng thái</label>
                        <select id="de-status" class="modal-input">
                            <option>Chưa xử lý</option>
                            <option>Đang xử lý</option>
                            <option>Đã rà soát</option>
                            <option>Đã hoàn thành</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.8rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Độ khẩn</label>
                        <select id="de-priority" class="modal-input">
                            <option>Thường</option>
                            <option>Khẩn</option>
                            <option>Thượng khẩn</option>
                        </select>
                    </div>
                </div>
                <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px;">
                    <button class="btn" style="background:#e2e8f0; color:#1e293b;" data-action="switch-doc-tab" data-doc-tab="view">Hủy</button>
                    <button class="btn btn-primary" data-action="save-doc-detail">💾 Lưu thay đổi</button>
                </div>
            </div>

            <div id="doc-panel-comments" style="display:none;">
                <div id="comment-list" style="display:flex; flex-direction:column; gap:14px; margin-bottom:20px;"></div>
                <div style="background:#f8fafc; border-radius:14px; padding:16px; border:1px solid #e2e8f0;">
                    <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:10px; font-weight: 600;">✍️ Thêm bình luận của bạn</p>
                    <textarea id="new-comment-text" rows="3" placeholder="Nhập nội dung bình luận..."
                        style="width:100%; border-radius:10px; background:#ffffff; border:1.5px solid #cbd5e1; color:#1e293b; padding:12px; resize:vertical; outline:none; font-family:inherit; font-size:0.95rem; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); transition: border-color 0.2s;"></textarea>
                    <div style="display:flex; justify-content:flex-end; margin-top:10px;">
                        <button class="btn btn-primary" data-action="submit-comment" style="padding:10px 24px;">Gửi bình luận</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
