<div id="rule-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
    <div class="data-section" style="width:420px; padding:30px;">
        <h3 style="margin-bottom:20px;">🤖 Thêm Auto Rule</h3>
        <div class="form-group" style="margin-bottom:16px;">
            <label style="display:block; font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px;">Từ khóa nhận diện</label>
            <input type="text" id="rule-keyword" placeholder="Vd: hỏa tốc, khẩn" style="width:100%; padding:10px; border:1.5px solid #cbd5e1; border-radius:8px; color:#1e293b; font-size:0.9rem;">
        </div>
        <div class="form-group" style="margin-bottom:16px;">
            <label style="display:block; font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px;">Số ngày xử lý mặc định</label>
            <input type="number" id="rule-days" value="15" min="1" style="width:100%; padding:10px; border:1.5px solid #cbd5e1; border-radius:8px; color:#1e293b; font-size:0.9rem;">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn" style="background:#e2e8f0; color:#1e293b;" data-action="close-rule-modal">Hủy</button>
            <button class="btn btn-primary" data-action="create-rule">Lưu rule</button>
        </div>
    </div>
</div>
