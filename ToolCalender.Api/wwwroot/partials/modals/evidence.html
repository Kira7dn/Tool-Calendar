<div id="evidence-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
    <div class="data-section" style="width:500px; padding:30px;">
        <h3 style="margin-bottom:20px;">📎 Nộp bằng chứng hoàn thành</h3>
        <input type="hidden" id="evidence-doc-id">
        <div class="form-group" style="margin-bottom:16px;">
            <label style="display:block; font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px;">Ghi chú kết quả xử lý</label>
            <textarea id="evidence-notes" rows="3" placeholder="Mô tả ngắn về kết quả xử lý..." style="width:100%; padding:10px; border:1.5px solid #cbd5e1; border-radius:8px; color:#1e293b; font-size:0.9rem; resize:vertical;"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label style="display:block; font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px;">File bằng chứng (ảnh, PDF, tài liệu)</label>
            <input type="file" id="evidence-files" multiple style="width:100%; padding:8px; border:1.5px solid #cbd5e1; border-radius:8px; color:#1e293b;" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn" style="background:#e2e8f0; color:#1e293b;" data-action="close-evidence-modal">Hủy</button>
            <button class="btn btn-primary" data-action="submit-evidence">&#9989; Xác nhận hoàn thành</button>
        </div>
    </div>
</div>
