<div id="label-modal" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
    <div class="data-section" style="width:380px; padding:30px;">
        <h3 style="margin-bottom:20px;">🏷️ Thêm Nhãn phân loại</h3>
        <div class="form-group" style="margin-bottom:16px;">
            <label style="display:block; font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px;">Tên nhãn</label>
            <input type="text" id="label-name" placeholder="Vd: Khẩn cần giải quyết" style="width:100%; padding:10px; border:1.5px solid #cbd5e1; border-radius:8px; color:#1e293b; font-size:0.9rem;">
        </div>
        <div class="form-group" style="margin-bottom:20px;">
            <label style="display:block; font-size:0.85rem; color:var(--text-secondary); margin-bottom:6px;">Màu hiển thị</label>
            <input type="color" id="label-color" value="#c0392b" style="width:80px; height:40px; border:1.5px solid #cbd5e1; border-radius:8px; cursor:pointer;">
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn" style="background:#e2e8f0; color:#1e293b;" data-action="close-label-modal">Hủy</button>
            <button class="btn btn-primary" data-action="create-label">Lưu nhãn</button>
        </div>
    </div>
</div>
