<style>

        stroke-linejoin: round;

        pointer-events: none;

    #review-side-by-side-modal .review-mini-btn .review-icon {

    #review-side-by-side-modal .review-icon-btn {

        height: 38px;

    #review-side-by-side-modal .review-mini-btn {

        color: #fff;

    }

    #review-side-by-side-modal .review-icon-btn-danger-soft {
        background: #ffffff;
        color: #c0392b;
        border: 1px solid rgba(192,57,43,0.22);
    }

    #review-side-by-side-modal .review-icon-btn-danger-soft:hover {

        color: #9f2d22;

    #review-side-by-side-modal .review-icon-btn-danger:hover {
        background: #0f5f59;
    }

        flex: 1;
        overflow: hidden;
        min-height: 0;

    #review-side-by-side-modal .review-left {

        border-right: 2px solid #e2e8f0;

    #review-side-by-side-modal .review-right {

    #review-side-by-side-modal .review-right .form-group {
        margin-bottom: 0;
        flex-shrink: 0;
    }

    #review-side-by-side-modal .review-panel-head {

        padding: 10px 12px;
        border-bottom: 1px solid #e2e8f0;
    }

    #review-side-by-side-modal .review-panel-head-light {
        background: linear-gradient(180deg, #f8fafc, #eef2f7);
    }

    #review-side-by-side-modal .review-head-stack {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
    }

    #review-side-by-side-modal .review-panel-title {
        font-weight: 700;
        color: var(--sidebar-bg);
        font-size: 0.92rem;
    }

    #review-side-by-side-modal .review-head-caption,
    #review-side-by-side-modal .review-page-info,
    #review-side-by-side-modal .review-page-tag,

    }

    #review-side-by-side-modal .review-head-caption {
        font-size: 0.74rem;
        line-height: 1.3;

    #review-side-by-side-modal .review-page-info,
    #review-side-by-side-modal .review-page-tag {

        font-weight: 800;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);

    #review-side-by-side-modal .review-page-tag {

        background: #e2e8f0;
        border-radius: 999px;
        color: #64748b;
        text-shadow: none;
    }

    #review-side-by-side-modal .review-meta-card,
    #review-side-by-side-modal .review-fulltext-card {
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: rgba(255,255,255,0.94);

    }

    #review-side-by-side-modal .review-meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 10px;
        padding: 10px;
    }

    #review-side-by-side-modal .review-field-span-2 {
        grid-column: span 2;
    }

    #review-side-by-side-modal .review-field-label {
        display: block;
        font-size: 0.75rem;
        margin-bottom: 3px;
    }

        padding: 8px 10px;
        border: 1.5px solid #cbd5e1;
        border-radius: 10px;
        color: #1e293b;
        font-size: 0.88rem;
        background: #fff;
        outline: none;
    }

    #review-side-by-side-modal .review-field-textarea {
        min-height: 64px;
        resize: none;
    }

    #review-side-by-side-modal .review-fulltext-group {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
    }

    #review-side-by-side-modal .review-fulltext-textarea {

        min-height: 0;
        overflow: auto;
        width: 100%;

        outline: none;

        background: linear-gradient(180deg, rgba(248,250,252,0.95), rgba(241,245,249,0.98));

        resize: none;
        white-space: pre-wrap;
        font-family: Consolas, "SFMono-Regular", "Liberation Mono", monospace;
    }

    #review-side-by-side-modal .review-pdf-stage {

        min-height: 0;
        overflow: auto;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 4px;
        background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 32%), linear-gradient(180deg, #5c6166 0%, #4b4f54 100%);
        position: relative;
    }

    /* Floating Navigation Controls */
    #review-side-by-side-modal .review-floating-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100;
        opacity: 0;
        transition: opacity 0.3s ease, transform 0.3s ease;
        pointer-events: none;
    }

    #review-side-by-side-modal .review-left:hover .review-floating-nav {
        opacity: 1;
        pointer-events: auto;
    }

    #review-side-by-side-modal .review-floating-nav-prev { left: 30px; transform: translateY(-50%) translateX(-10px); }
    #review-side-by-side-modal .review-floating-nav-next { right: 30px; transform: translateY(-50%) translateX(10px); }
    
    #review-side-by-side-modal .review-left:hover .review-floating-nav-prev { transform: translateY(-50%) translateX(0); }
    #review-side-by-side-modal .review-left:hover .review-floating-nav-next { transform: translateY(-50%) translateX(0); }

    #review-side-by-side-modal .review-float-btn {
        width: 56px;
        height: 56px;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        transition: all 0.2s ease;
    }

    #review-side-by-side-modal .review-float-btn:hover {
        background: rgba(37, 99, 235, 0.9);
        transform: scale(1.1);
        border-color: rgba(255,255,255,0.4);
    }

    #review-side-by-side-modal .review-floating-page-info {
        position: absolute;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(4px);
        padding: 6px 16px;
        border-radius: 20px;
        z-index: 90;
        border: 1px solid rgba(255,255,255,0.1);
        pointer-events: none;
        opacity: 0.8;
    }

    #review-side-by-side-modal .review-pdf-canvas {
        max-width: 100%;
        box-shadow: 0 14px 36px rgba(0,0,0,0.42);
        border-radius: 4px;
    }

    @media (max-width: 900px) {
        #review-side-by-side-modal .review-layout {
            grid-template-columns: 1fr;
        }

        #review-side-by-side-modal .review-left {

            width: 98vw;

        }

        #review-side-by-side-modal .review-meta-grid {
            grid-template-columns: 1fr;

        #review-side-by-side-modal .review-field-span-2 {
            grid-column: span 1;
        }

        #review-side-by-side-modal .review-head-caption {
            display: none;
        }
        
        #review-side-by-side-modal .review-panel-title-main {
            max-width: 150px;
        }
    }
</style>
