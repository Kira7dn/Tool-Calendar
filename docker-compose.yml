services:
  official-doc-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-coordination-system
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_PATH=/app/data/documents.db
      - OcrSettings__TessDataPath=/usr/share/tesseract-ocr/5/tessdata
      - TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
    volumes:
      - ./data:/app/data
      - ./ToolCalender.Api/Uploads:/app/Uploads
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - official-doc-backend
    restart: always

  ngrok:
    image: ngrok/ngrok:alpine
    container_name: doc-coordination-ngrok
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - nginx-proxy:80
    depends_on:
      - nginx
