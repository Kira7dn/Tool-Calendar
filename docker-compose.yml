services:
  official-doc-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: doc-coordination-system
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_PATH=/app/data/documents.db
      - OcrSettings__TessDataPath=/usr/share/tesseract-ocr/5/tessdata
      - TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
      - DOTNET_USE_POLLING_FILE_WATCHER=1
    volumes:
      - .:/app
      - ./data:/app/data
      - ./ToolCalender.Api/Uploads:/app/Uploads
      - ~/.nuget/packages:/root/.nuget/packages:ro
    command: dotnet watch run --project ToolCalender.Api/ToolCalender.Api.csproj --urls http://0.0.0.0:5000
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - official-doc-backend
    restart: always
